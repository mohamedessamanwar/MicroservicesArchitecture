services:
  # =========================
  # PostgreSQL (Write DB) - Debezium needs logical replication
  # =========================
  write-db:
    image: postgres:16-alpine
    container_name: write-db
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: write_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d write_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # =========================
  # Redis
  # =========================
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # =========================
  # RabbitMQ
  # =========================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    # Environment variables to set the default admin user and password
    # These credentials are used by the OrderService, Debezium, and Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"   # AMQP protocol port (used by services to publish/consume)
      - "15672:15672" # Management UI port (access at http://localhost:15672)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices-network
    # Healthcheck is CRITICAL for dependent services (like rabbitmq-init) to know when RabbitMQ is actually ready
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # =========================
  # RabbitMQ Init (Create Exchange/Queues/Bindings)
  # This is a specialized container that runs ONCE to set up the RabbitMQ topology.
  # It eliminates the need for manual setup or handling topology in the application code.
  # =========================
  rabbitmq-init:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-init
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-network
    restart: "no"
    command: |
      sh -c "
      echo 'Waiting for rabbitmq management API on port 15672...' &&
      until wget -qO- http://admin:admin123@rabbitmq:15672/api/overview > /dev/null 2>&1; do
        sleep 2
      done
      echo 'Management API is up. Declaring topology...' &&
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare exchange name=cdc.exchange type=topic durable=true &&
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare queue name=order.write.cdc.q durable=true &&
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare queue name=payment.write.cdc.q durable=true &&
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare binding source=cdc.exchange destination=order.write.cdc.q routing_key='order-server.public.#' &&
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare binding source=cdc.exchange destination=payment.write.cdc.q routing_key='payment-server.public.#' &&
      # DEBUG: Catch-all to see what keys are actually being sent
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare binding source=cdc.exchange destination=order.write.cdc.q routing_key='#' &&
      echo 'RabbitMQ exchange/queues/wildcard-bindings created.'
      "


  # =========================
  # Database Init (Create databases & Set up Replication)
  # =========================
  db-init:
    image: postgres:16-alpine
    container_name: db-init
    depends_on:
      write-db:
        condition: service_healthy
      read-db:
        condition: service_healthy
    networks:
      - microservices-network
    restart: "no"
    environment:
      PGHOST: write-db
      PGPORT: 5432
      PGUSER: admin
      PGPASSWORD: pass
      PGDATABASE: postgres
    volumes:
      - ./compose/db-init/init-db.sh:/scripts/init-db.sh:ro
    command: ["sh", "/scripts/init-db.sh"]

  # =========================
  # PostgreSQL (Read Replica) - Asynchronous Logical Replica
  # =========================
  read-db:
    image: postgres:16-alpine
    container_name: read-db
    command:
      - postgres
      - -c
      - wal_level=logical
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: replica_db
    ports:
      - "5433:5432"
    volumes:
      - read_db_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d replica_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # =========================
  # Debezium - Order DB
  # Connects to the Write DB (PostgreSQL) and streams changes to RabbitMQ.
  # Depends on the DB existing and RabbitMQ being configured (rabbitmq-init).
  # =========================
  debezium-order:
    image: debezium/server:2.6
    container_name: debezium-order
    depends_on:
      write-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      db-init:
        condition: service_completed_successfully
    networks:
      - microservices-network
    environment:
      - DEBEZIUM_SOURCE_PLUGIN_NAME=pgoutput
      - DEBEZIUM_SOURCE_SLOT_NAME=order_slot
      - DEBEZIUM_SOURCE_PUBLICATION_NAME=order_pub
      - DEBEZIUM_SOURCE_DATABASE_DBNAME=OrderDb
      - DEBEZIUM_SOURCE_TOPIC_PREFIX=order-server
    restart: unless-stopped
    volumes:
      - ./debezium/orderdb-application.properties:/debezium/conf/application.properties:ro
      - debezium_order_data:/debezium/data

  # =========================
  # Debezium - Payment DB
  # =========================
  debezium-payment:
    image: debezium/server:2.6
    container_name: debezium-payment
    depends_on:
      write-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      db-init:
        condition: service_completed_successfully
    networks:
      - microservices-network
    environment:
      - DEBEZIUM_SOURCE_PLUGIN_NAME=pgoutput
      - DEBEZIUM_SOURCE_SLOT_NAME=payment_slot
      - DEBEZIUM_SOURCE_PUBLICATION_NAME=payment_pub
      - DEBEZIUM_SOURCE_DATABASE_DBNAME=PaymentDb
      - DEBEZIUM_SOURCE_TOPIC_PREFIX=payment-server
    restart: unless-stopped
    volumes:
      - ./debezium/paymentdb-application.properties:/debezium/conf/application.properties:ro
      - debezium_payment_data:/debezium/data

  # =========================
  # Order Service 
  # =========================
  order-service:
    build:
      context: .
      dockerfile: OrderService.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: Debug
    container_name: order-service
    ports:
      - "8080:8080"
      - "4024:4024"
    environment:
      - ConnectionStrings__Egypt__Primary=Host=write-db;Port=5432;Database=OrderDb;Username=admin;Password=pass;
      - ConnectionStrings__Egypt__Replica=Host=read-db;Port=5432;Database=OrderDb;Username=admin;Password=pass;
      - ConnectionStrings__UAE__Primary=Host=write-db-uae;Port=5432;Database=OrderDb-uae;Username=admin;Password=pass;
      - ConnectionStrings__UAE__Replica=Host=read-db-uae;Port=5432;Database=OrderDb-uae;Username=admin;Password=pass;
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      - VSDBG_PMI_ENABLE=1
      - DOTNET_ENVIRONMENT=Development
    depends_on:
      write-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================
  # Payment Service 
  # =========================
  payment-service:
    build:
      context: .
      dockerfile: Payment.Api/Dockerfile
    container_name: payment-service
    ports:
      - "8081:8080"
    environment:
      - ConnectionStrings__Egypt__Primary=Host=write-db;Port=5432;Database=PaymentDb;Username=admin;Password=pass;
      - ConnectionStrings__Egypt__Replica=Host=write-db;Port=5432;Database=PaymentDb;Username=admin;Password=pass;
      - ConnectionStrings__UAE__Primary=Host=write-db-uae;Port=5432;Database=PaymentDb-uae;Username=admin;Password=pass;
      - ConnectionStrings__UAE__Replica=Host=write-db-uae;Port=5432;Database=PaymentDb-uae;Username=admin;Password=pass;
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
    depends_on:
      write-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - microservices-network

  # =========================
  # Replica Setup (Automated Subscription)
  # =========================
  replica-setup:
    image: postgres:16-alpine
    container_name: replica-setup
    depends_on:
      order-service:
        condition: service_healthy
      read-db:
        condition: service_healthy
    networks:
      - microservices-network
    environment:
      PGPASSWORD: pass
    restart: "no"
    volumes:
      - ./compose/db-init/replica-setup.sh:/scripts/replica-setup.sh:ro
    command: ["sh", "/scripts/replica-setup.sh"]

volumes:
  postgres_data:
  read_db_data:
  redis_data:
  rabbitmq_data:
  debezium_order_data:
  debezium_payment_data:

networks:
  microservices-network:
    driver: bridge
