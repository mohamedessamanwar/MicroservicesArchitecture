services:
  rabbitmq-init:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-init
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-network
    restart: "no"
    command: |
      sh -c "
      echo 'Waiting for rabbitmq management API on port 15672...' &&
      until wget -qO- http://admin:admin123@rabbitmq:15672/api/overview > /dev/null 2>&1; do
        sleep 2
      done
      echo 'Management API is up. Declaring topology...' &&
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare exchange name=cdc.exchange type=topic durable=true &&
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare queue name=order.write.cdc.q durable=true &&
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare queue name=payment.write.cdc.q durable=true &&
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare binding source=cdc.exchange destination=order.write.cdc.q routing_key='order-server.public.#' &&
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare binding source=cdc.exchange destination=payment.write.cdc.q routing_key='payment-server.public.#' &&
      # DEBUG: Catch-all to see what keys are actually being sent
      rabbitmqadmin -H rabbitmq -u admin -p admin123 declare binding source=cdc.exchange destination=order.write.cdc.q routing_key='#' &&
      echo 'RabbitMQ exchange/queues/wildcard-bindings created.'
      "

  db-init:
    image: postgres:16-alpine
    container_name: db-init
    depends_on:
      write-db:
        condition: service_healthy
      read-db:
        condition: service_healthy
    networks:
      - microservices-network
    restart: "no"
    environment:
      PGHOST: write-db
      PGPORT: 5432
      PGUSER: admin
      PGPASSWORD: pass
      PGDATABASE: postgres
    command: |
      sh -c "
      echo 'Creating databases on Primary (write-db)...' &&
      psql -h write-db -c 'CREATE DATABASE \"OrderDb\";' 2>&1 | grep -v 'already exists' || true &&
      psql -h write-db -c 'CREATE DATABASE \"PaymentDb\";' 2>&1 | grep -v 'already exists' || true &&

      echo 'Creating OrderDb on Replica (read-db)...' &&
      psql -h read-db -c 'CREATE DATABASE \"OrderDb\";' 2>&1 | grep -v 'already exists' || true &&
      psql -h read-db -c 'CREATE DATABASE \"PaymentDb\";' 2>&1 | grep -v 'already exists' || true &&

      echo 'Setting up logical replication publications on primary...' &&
      psql -h write-db -d OrderDb -c \"DROP PUBLICATION IF EXISTS order_pub;\" &&
      psql -h write-db -d OrderDb -c \"CREATE PUBLICATION order_pub FOR ALL TABLES;\" &&
      psql -h write-db -d PaymentDb -c \"DROP PUBLICATION IF EXISTS payment_pub;\" &&
      psql -h write-db -d PaymentDb -c \"CREATE PUBLICATION payment_pub FOR ALL TABLES;\" &&
      
      echo 'Ensuring Replica Identity on key tables...' &&
      psql -h write-db -d OrderDb -c \"ALTER TABLE IF EXISTS \\\"Orders\\\" REPLICA IDENTITY FULL;\" || true &&
      
      echo 'Databases and Publications setup completed.'
      "

  debezium-order:
    image: debezium/server:2.6
    container_name: debezium-order
    depends_on:
      write-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      db-init:
        condition: service_completed_successfully
    networks:
      - microservices-network
    environment:
      - DEBEZIUM_SOURCE_PLUGIN_NAME=pgoutput
      - DEBEZIUM_SOURCE_SLOT_NAME=order_slot
      - DEBEZIUM_SOURCE_PUBLICATION_NAME=order_pub
      - DEBEZIUM_SOURCE_DATABASE_DBNAME=OrderDb
      - DEBEZIUM_SOURCE_TOPIC_PREFIX=order-server
    restart: unless-stopped
    volumes:
      - ./debezium/orderdb-application.properties:/debezium/conf/application.properties:ro
      - debezium_order_data:/debezium/data

  debezium-payment:
    image: debezium/server:2.6
    container_name: debezium-payment
    depends_on:
      write-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      db-init:
        condition: service_completed_successfully
    networks:
      - microservices-network
    environment:
      - DEBEZIUM_SOURCE_PLUGIN_NAME=pgoutput
      - DEBEZIUM_SOURCE_SLOT_NAME=payment_slot
      - DEBEZIUM_SOURCE_PUBLICATION_NAME=payment_pub
      - DEBEZIUM_SOURCE_DATABASE_DBNAME=PaymentDb
      - DEBEZIUM_SOURCE_TOPIC_PREFIX=payment-server
    restart: unless-stopped
    volumes:
      - ./debezium/paymentdb-application.properties:/debezium/conf/application.properties:ro
      - debezium_payment_data:/debezium/data

  replica-setup:
    image: postgres:16-alpine
    container_name: replica-setup
    depends_on:
      order-service:
        condition: service_healthy
      read-db:
        condition: service_healthy
    networks:
      - microservices-network
    environment:
      PGPASSWORD: pass
    restart: "no"
    command: |
      sh -c "
      echo 'Waiting for OrderService to apply migrations to replica...' &&
      until psql -h read-db -U admin -d OrderDb -c 'SELECT count(*) FROM \"Orders\";' > /dev/null 2>&1; do
        echo 'Waiting for tables on read-db...'
        sleep 5
      done
      
      echo 'Schema detected. Checking for subscription...'
      if psql -h read-db -U admin -d OrderDb -tAc \"SELECT 1 FROM pg_subscription WHERE subname = 'order_sub'\" | grep -q 1; then
        echo 'Subscription order_sub already exists. Skipping.'
      else
        echo 'Cleaning up potential stale slots on Primary...'
        psql -h write-db -U admin -d OrderDb -c \"SELECT pg_drop_replication_slot('order_sub') WHERE EXISTS (SELECT 1 FROM pg_replication_slots WHERE slot_name = 'order_sub');\" || true
        
        echo 'Creating subscription...'
        psql -h read-db -U admin -d OrderDb -c \"CREATE SUBSCRIPTION order_sub CONNECTION 'host=write-db port=5432 user=admin password=pass dbname=OrderDb' PUBLICATION order_pub;\" && \
        echo 'Subscription created.'
      fi
      
      echo 'Logical replication automated successfully.'
      "

volumes:
  debezium_order_data:
  debezium_payment_data:

networks:
  microservices-network:
    external: true
